<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PrecisionKitchen™ Products</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <h1>PrecisionKitchen™</h1>
  <p>Premium Tools for Smart Cooking</p>
</header>

<main>
  <section class="products-section">
    <h2>Our Products</h2>
    <div class="product-grid">

      <!-- Product 1 -->
      <div class="product-card">
        <img src="images/scale.jpg" alt="Smart Nutrition Scale">
        <h3>Smart Nutrition Scale</h3>
        <p class="price">$34.99</p>
        <button onclick="addToCart('Smart Nutrition Scale', 34.99)">Add to Cart</button>
      </div>

      <!-- Product 2 -->
      <div class="product-card">
        <img src="images/oil-spray.jpg" alt="Oil Spray Bottle">
        <h3>Oil Spray Bottle</h3>
        <p class="price">$19.99</p>
        <button onclick="addToCart('Oil Spray Bottle', 19.99)">Add to Cart</button>
      </div>

      <!-- Product 3 -->
      <div class="product-card">
        <img src="images/spoon.jpg" alt="Adjustable Measuring Spoon">
        <h3>Adjustable Measuring Spoon</h3>
        <p class="price">$14.99</p>
        <button onclick="addToCart('Adjustable Measuring Spoon', 14.99)">Add to Cart</button>
      </div>

    </div>
  </section>

  <!-- Cart Section -->
  <section class="cart-section">
    <h2>Your Cart</h2>
    <ul id="cart-items"></ul>
    <p>Total: $<span id="cart-total">0.00</span></p>

    <!-- PayPal Button -->
    <div id="paypal-button-container"></div>
  </section>
</main>

<script src="script.js"></script>
<script src="https://www.paypal.com/sdk/js?client-id=YOUR_PAYPAL_CLIENT_ID&currency=USD"></script>
<script>
  // Render PayPal Button
  paypal.Buttons({
    createOrder: function(data, actions) {
      const total = document.getElementById("cart-total").innerText;
      return actions.order.create({
        purchase_units: [{ amount: { value: total } }]
      });
    },
    onApprove: function(data, actions) {
      return actions.order.capture().then(function(details) {
        alert("Payment completed by " + details.payer.name.given_name);
        cart = []; 
        updateCart();
      });
    }
  }).render('#paypal-button-container');
</script>

</body>
</html>
